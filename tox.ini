[tox]
envlist = 3.1{0,1,2,3,4}, lint, pre-commit

[testenv]
setenv =
  PYTEST_ADDOPTS=-rxXs -p pytester --basetemp={envtmpdir}
passenv =
  TEST_JIRA_TOKEN
  TEST_JIRA_USER
deps = uv
commands =
  uv python pin python{envname}
  uv sync --locked --all-extras --dev --group tests
  uv run coverage run --source=pytest_jira,issue_model -m pytest
  uv run coverage xml
  uv run coverage html

[testenv:lint]
deps = uv
commands = uv tool run flake8 pytest_jira.py issue_model.py tests

[testenv:pre-commit]
deps = uv
commands = uv tool run pre-commit run --all-files
